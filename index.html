<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sternberg's Triangle of Love - Dr. Nakip</title>
    <style>
        :root {
            /* VIBRANT UI Palette */
            --bg-color: #f8fafc;
            --text-color: #1e293b;
            --passion-color: #ff0040;    /* Vibrant Crimson */
            --liking-color: #00bfff;     /* Vibrant Sky Blue */
            --commitment-color: #32cd32; /* Vibrant Lime Green */
            --empty-color: #cbd5e1;      /* Base Gray */
            --shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            text-align: center; 
            padding: 40px 20px 10px 20px; 
            gap: 0px; 
        }
        
        h1 { font-size: 2.2rem; margin-bottom: 5px; margin-top: 0; }
        h3 { font-weight: 400; color: #64748b; margin-top: 0; margin-bottom: 0px; } 

        .header-logo {
            max-width: 350px; 
            height: auto; 
            border-radius: 8px;
            margin-top: 5px;
        }

        .main-container {
            display: flex;
            width: 90%;
            max-width: 1100px;
            align-items: center;
            justify-content: space-between;
            gap: 40px;
            margin-bottom: 30px;
        }

        #narrative-box {
            flex: 0 0 320px;
            background: white;
            padding: 25px;
            border-radius: 20px;
            box-shadow: var(--shadow);
            border-left: 8px solid var(--empty-color);
            min-height: 200px;
            transition: border-color 0.2s ease;
            box-sizing: border-box;
        }

        #love-type { font-size: 1.4rem; font-weight: 800; display: block; margin-bottom: 10px; }
        #love-desc { line-height: 1.5; color: #475569; font-size: 0.9rem; }

        .triangle-scene {
            flex: 1;
            height: 450px;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
        }

        svg { width: 100%; height: 100%; overflow: visible; }

        #base-triangle {
            fill: #edf2f7;
            stroke: #e2e8f0;
            stroke-width: 2;
        }

        #love-polygon {
            fill-opacity: 0.95;
            transition: points 0.15s linear, fill 0.2s ease;
        }

        .label {
            font-size: 22px; 
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }
        
        .label.liking { fill: var(--liking-color); }
        .label.passion { fill: var(--passion-color); }
        .label.commitment { fill: var(--commitment-color); }

        .total-score {
            font-size: 28px;
            font-weight: 900;
            fill: #64748b; 
            transition: fill 0.2s ease;
            pointer-events: none; 
        }

        #controls-wrapper {
            width: 90%;
            max-width: 900px;
            background: white;
            padding: 30px 40px;
            border-radius: 24px;
            box-shadow: var(--shadow);
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 30px;
            margin-bottom: 40px;
            box-sizing: border-box;
        }

        .input-group { position: relative; }
        label { display: flex; flex-direction: column; font-weight: 700; margin-bottom: 12px; font-size: 0.85rem; cursor: help; }
        .val-num { font-size: 1.2rem; margin-top: 4px; }

        .tooltip-text {
            visibility: hidden; width: 250px; background: #1e293b; color: white; padding: 15px;
            border-radius: 12px; position: absolute; bottom: 130%; left: 50%; transform: translateX(-50%);
            opacity: 0; transition: all 0.3s ease; z-index: 100; font-weight: 400; font-size: 0.8rem; pointer-events: none; line-height: 1.4;
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.3);
        }
        
        label:hover .tooltip-text,
        label:active .tooltip-text { 
            visibility: visible; 
            opacity: 1; 
            bottom: 115%; 
        }

        input[type="range"] { width: 100%; cursor: pointer; accent-color: currentColor; }

        .p-ui { color: var(--passion-color); }
        .l-ui { color: var(--liking-color); }
        .c-ui { color: var(--commitment-color); }

        @media (max-width: 768px) {
            header { padding: 20px 15px 10px 15px; }
            h1 { font-size: 1.8rem; }
            .header-logo { max-width: 280px; }
            .main-container { flex-direction: column; gap: 20px; }
            #narrative-box { flex: none; width: 100%; min-height: auto; }
            .triangle-scene { height: auto; max-width: 400px; margin: 0 auto; }
            #controls-wrapper { grid-template-columns: 1fr; gap: 20px; padding: 25px; }
            .tooltip-text { width: 200px; }
        }
    </style>
</head>
<body>

<header>
    <div>
        <h1>Sternberg's Triangle of Love</h1>
        <h3>Concept Visualization by Dr. Nakip</h3>
    </div>
    <img src="Logo-Centered.png" alt="Dr. Nakip Logo" class="header-logo">
</header>

<div class="main-container">
    <div id="narrative-box">
        <strong id="love-type">Non-love</strong>
        <span id="love-desc">Move the sliders to visualize the dimensions of love.</span>
    </div>

    <div class="triangle-scene">
        <svg viewBox="0 0 500 500">
            <text x="250" y="30" text-anchor="middle" class="label liking">
                <tspan x="250" dy="0">Liking</tspan>
                <tspan x="250" dy="20" style="font-size: 14px;">(Friendship)</tspan>
            </text>
            
            <text x="10" y="470" text-anchor="start" class="label passion">
                <tspan x="10" dy="0">Passion</tspan>
                <tspan x="10" dy="20" style="font-size: 14px;">(Physical Intimacy)</tspan>
            </text>
            
            <text x="490" y="470" text-anchor="end" class="label commitment">
                <tspan x="490" dy="0">Commitment</tspan>
                <tspan x="490" dy="20" style="font-size: 14px;">(Pledge)</tspan>
            </text>

            <polygon id="base-triangle" points="250,70 50,440 450,440" />
            <polygon id="love-polygon" points="250,220 205,295 295,295" fill="#cbd5e1" />
            
            <text id="total-display" x="250" y="280" text-anchor="middle" class="total-score">0</text>
        </svg>
    </div>
</div>

<div id="controls-wrapper">
    <div class="input-group p-ui">
        <label>Passion (Physical Intimacy) <span class="val-num" id="val-p">0</span>
            <span class="tooltip-text"><strong>Passion (Physical Intimacy):</strong> The drive and excitement component. Associated with romance, physical attraction, and a strong feeling of enthusiasm.</span>
        </label>
        <input type="range" id="passion" min="0" max="150" value="0">
    </div>

    <div class="input-group l-ui">
        <label>Liking (Friendship) <span class="val-num" id="val-l">0</span>
            <span class="tooltip-text"><strong>Liking (Friendship):</strong> The attachment and bonding component. Associated with connection, closeness, and understanding.</span>
        </label>
        <input type="range" id="liking" min="0" max="150" value="0">
    </div>

    <div class="input-group c-ui">
        <label>Commitment(Pledge) <span class="val-num" id="val-c">0</span>
            <span class="tooltip-text"><strong>Commitment(Pledge):</strong> The decision and continuation component. Associated with finality, the future, and an agreement or pledge to stay together.</span>
        </label>
        <input type="range" id="commitment" min="0" max="150" value="0">
    </div>
</div>

<script>
    const pInput = document.getElementById('passion');
    const lInput = document.getElementById('liking');
    const cInput = document.getElementById('commitment');
    const lovePolygon = document.getElementById('love-polygon');
    const narrativeBox = document.getElementById('narrative-box');
    const totalDisplay = document.getElementById('total-display');

    function update() {
        const p = parseInt(pInput.value);
        const l = parseInt(lInput.value);
        const c = parseInt(cInput.value);

        document.getElementById('val-p').textContent = p;
        document.getElementById('val-l').textContent = l;
        document.getElementById('val-c').textContent = c;

        const total = p + l + c;
        totalDisplay.textContent = total;
        
        if (total > 0) {
            totalDisplay.style.fill = "#ffffff";
        } else {
            totalDisplay.style.fill = "#64748b"; 
        }

        // --- UPDATED MATH: Normalizing to a 150 scale instead of 100 ---
        const pn = p / 150;
        const ln = l / 150;
        const cn = c / 150;

        const w000 = (1 - pn) * (1 - ln) * (1 - cn); 
        const w100 = pn * (1 - ln) * (1 - cn);       
        const w010 = (1 - pn) * ln * (1 - cn);       
        const w001 = (1 - pn) * (1 - ln) * cn;       
        const w110 = pn * ln * (1 - cn);             
        const w101 = pn * (1 - ln) * cn;             
        const w011 = (1 - pn) * ln * cn;             
        const w111 = pn * ln * cn;                   

        const r = Math.round(
            203 * w000 + 255 * w100 +   0 * w010 +  50 * w001 + 
            255 * w110 + 255 * w101 +   0 * w011 + 160 * w111
        );
        const g = Math.round(
            213 * w000 +   0 * w100 + 191 * w010 + 205 * w001 + 
             50 * w110 + 140 * w101 + 220 * w011 +  32 * w111
        );
        const b = Math.round(
            225 * w000 +  64 * w100 + 255 * w010 +  50 * w001 + 
            200 * w110 +   0 * w101 + 180 * w011 + 240 * w111
        );

        const currentColor = `rgb(${r}, ${g}, ${b})`;
        lovePolygon.setAttribute('fill', currentColor);
        narrativeBox.style.borderLeftColor = currentColor;

        // --- GEOMETRIC STRETCH LOGIC ---
        const coreLiking = { x: 250, y: 220 };
        const corePassion = { x: 205, y: 295 };
        const coreCommit = { x: 295, y: 295 };

        const targetLiking = { x: 250, y: 70 };
        const targetPassion = { x: 50, y: 440 };
        const targetCommit = { x: 450, y: 440 };

        const ly = coreLiking.y + (targetLiking.y - coreLiking.y) * ln;
        const px = corePassion.x + (targetPassion.x - corePassion.x) * pn;
        const py = corePassion.y + (targetPassion.y - corePassion.y) * pn;
        const cx_pt = coreCommit.x + (targetCommit.x - coreCommit.x) * cn;
        const cy_pt = coreCommit.y + (targetCommit.y - coreCommit.y) * cn;

        lovePolygon.setAttribute('points', `${coreLiking.x},${ly} ${px},${py} ${cx_pt},${cy_pt}`);

        // --- UPDATED NARRATIVE LOGIC: Scaled up to match a max of 150 (105 is 70% of 150) ---
        let type = "Non-love", desc = "Absence of all three components.";
        
        if (p > 105 && l > 105 && c > 105) { type = "Consummate Love"; desc = "The ideal balance of Passion (Physical Intimacy), Liking (Friendship), and Commitment(Pledge)."; }
        else if (p > 105 && l > 105) { type = "Romantic Love"; desc = "Bonded through Passion (Physical Intimacy) and Liking (Friendship), but lacks Commitment(Pledge)."; }
        else if (l > 105 && c > 105) { type = "Companionate Love"; desc = "Deep friendship and Commitment(Pledge) without the 'spark'."; }
        else if (p > 105 && c > 105) { type = "Fatuous Love"; desc = "Whirlwind Commitment(Pledge) based on Passion (Physical Intimacy) alone."; }
        else if (p > 105) { type = "Infatuation"; desc = "Intense physical desire without intimacy or future plans."; }
        else if (l > 105) { type = "Liking (Friendship)"; desc = "Closeness and warmth without Passion (Physical Intimacy) or Commitment(Pledge)."; }
        else if (c > 105) { type = "Empty Love"; desc = "Commitment(Pledge) remains, but the spark and connection have faded."; }
        else if (p > 0 || l > 0 || c > 0) { type = "Developing Love"; desc = "A mix of dimensions in transition."; }

        document.getElementById('love-type').innerText = type;
        document.getElementById('love-desc').innerText = desc;
    }

    [pInput, lInput, cInput].forEach(i => i.addEventListener('input', update));
    update();
</script>

</body>
</html>
